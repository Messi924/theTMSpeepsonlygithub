<!DOCTYPE html>
<html>
<head>
  <title>Basket Random</title>
  <style>body{background:#ff9800;margin:0;}canvas{display:block;margin:auto;background:#ffe0b2;}</style>
</head>
<body>
<canvas id="gameCanvas" width="500" height="300"></canvas>
<script>
const canvas=document.getElementById("gameCanvas");const ctx=canvas.getContext("2d");
let ball={x:250,y:0,dy:3,r:10};let hoop={x:200,y:250,w:100,h:10};let score=0;
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft"&&hoop.x>0)hoop.x-=20;if(e.key==="ArrowRight"&&hoop.x<400)hoop.x+=20;});
function draw(){
 ctx.clearRect(0,0,500,300);
 ctx.fillStyle="blue";ctx.fillRect(hoop.x,hoop.y,hoop.w,hoop.h);
 ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fillStyle="black";ctx.fill();
 ball.y+=ball.dy;
 if(ball.y>300){ball.y=0;ball.x=Math.random()*500;}
 if(ball.y+ball.r>hoop.y&&ball.x>hoop.x&&ball.x<hoop.x+hoop.w){score++;ball.y=0;ball.x=Math.random()*500;}
 ctx.fillStyle="black";ctx.font="20px Arial";ctx.fillText("Score:"+score,10,20);
}
setInterval(draw,30);
</script>
</body>
</html>
